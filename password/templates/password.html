{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Password | Secure Pass</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Your Password</h1>
        
        <div class="password-display" id="password-text">{{ password }}</div>
        
        <div class="d-flex flex-column gap-3">
            <button onclick="copyPassword()" class="btn-generate" style="background: var(--text-main); color: var(--bg-dark);">
                Copy to Clipboard
            </button>
            <a href="{% url 'home' %}" class="btn-copy" style="margin-top: 1rem; display: block; border: none;">
                Generate Another
            </a>
        </div>
    </div>

    <script>
        function copyPassword() {
            const password = document.getElementById('password-text').innerText;
            navigator.clipboard.writeText(password).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.style.background = '#10b981'; // Success green
                btn.style.color = 'white';
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = 'var(--text-main)';
                    btn.style.color = 'var(--bg-dark)';
                }, 2000);
            });
        }
    </script>
</body>
</html>
